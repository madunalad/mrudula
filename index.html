<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>For Mrudula 💕</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Tenor+Sans&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --rose:      #c0396b;
    --blush:     #f7d6e0;
    --petal:     #fdeef4;
    --deep:      #7a1a3a;
    --gold:      #c9986a;
    --cream:     #fdf6f0;
    --text:      #3d1a28;
  }

  body {
    min-height: 100vh;
    background: var(--cream);
    font-family: 'Cormorant Garamond', serif;
    color: var(--text);
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ── Petal rain ── */
  .petals-wrap { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .petal {
    position: absolute;
    top: -60px;
    width: 18px; height: 22px;
    border-radius: 50% 0 50% 0;
    background: radial-gradient(circle at 40% 40%, #f7aac5, #e07090);
    opacity: 0;
    animation: fall linear infinite;
  }
  @keyframes fall {
    0%   { transform: translateY(0) rotate(0deg) scale(1);   opacity: .7; }
    80%  { opacity: .5; }
    100% { transform: translateY(110vh) rotate(360deg) scale(.6); opacity: 0; }
  }

  /* ── Floating hearts bg ── */
  .hearts-bg { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .hbg {
    position: absolute;
    font-size: 1.4rem;
    opacity: 0.07;
    animation: floatHeart 12s ease-in-out infinite;
  }
  @keyframes floatHeart {
    0%, 100% { transform: translateY(0) scale(1); }
    50%       { transform: translateY(-30px) scale(1.1); }
  }

  /* ── Card ── */
  .card {
    position: relative; z-index: 10;
    background: rgba(253,246,240,0.88);
    backdrop-filter: blur(10px);
    border: 1.5px solid rgba(192,57,107,0.18);
    border-radius: 28px;
    padding: 56px 60px 52px;
    max-width: 520px; width: 90%;
    text-align: center;
    box-shadow: 0 8px 60px rgba(122,26,58,0.13), 0 2px 12px rgba(192,57,107,0.08);
    animation: cardIn .9s cubic-bezier(.22,1,.36,1) both;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(40px) scale(.96); }
    to   { opacity: 1; transform: none; }
  }

  .ornament { font-size: 1.8rem; letter-spacing: 6px; color: var(--rose); margin-bottom: 6px; }

  .name-to {
    font-family: 'Tenor Sans', sans-serif;
    font-size: .72rem;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 22px;
  }

  .question {
    font-size: clamp(1.8rem, 5vw, 2.5rem);
    font-style: italic;
    font-weight: 300;
    line-height: 1.35;
    color: var(--deep);
    margin-bottom: 10px;
    transition: opacity .35s, transform .35s;
  }

  .sub {
    font-size: .95rem;
    color: var(--rose);
    opacity: .7;
    margin-bottom: 38px;
    min-height: 22px;
    transition: opacity .3s;
  }

  /* ── Buttons ── */
  .btns { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }

  .btn {
    font-family: 'Tenor Sans', sans-serif;
    font-size: .88rem;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    padding: 14px 34px;
    border-radius: 50px;
    border: none;
    cursor: pointer;
    transition: transform .18s, box-shadow .18s, background .2s;
    outline: none;
  }
  .btn:active { transform: scale(.95) !important; }

  .btn-yes {
    background: linear-gradient(135deg, var(--rose), var(--deep));
    color: #fff;
    box-shadow: 0 4px 22px rgba(192,57,107,0.35);
  }
  .btn-yes:hover { transform: translateY(-2px) scale(1.03); box-shadow: 0 8px 30px rgba(192,57,107,0.45); }

  .btn-no {
    background: var(--blush);
    color: var(--deep);
    box-shadow: 0 2px 12px rgba(192,57,107,0.1);
  }
  .btn-no:hover { transform: translateY(-2px) scale(1.03); background: #f0c0d0; }

  /* ── Final screen ── */
  .final {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    animation: cardIn .7s ease both;
  }
  .final .big-heart { font-size: 5rem; animation: heartBeat 1.2s ease infinite; }
  @keyframes heartBeat {
    0%,100% { transform: scale(1); }
    20%      { transform: scale(1.18); }
    40%      { transform: scale(1); }
    60%      { transform: scale(1.1); }
  }
  .final h1 {
    font-size: clamp(2rem,6vw,3rem);
    font-style: italic;
    font-weight: 300;
    color: var(--deep);
    line-height: 1.3;
  }
  .final p {
    font-size: 1.05rem;
    color: var(--rose);
    opacity: .8;
  }

  /* ── Confetti ── */
  .confetti-wrap { position: fixed; inset: 0; pointer-events: none; z-index: 20; }
  .conf {
    position: absolute;
    width: 8px; height: 8px;
    border-radius: 50%;
    top: -10px;
    animation: confFall linear forwards;
    opacity: 0;
  }
  @keyframes confFall {
    0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(105vh) rotate(720deg); opacity: 0; }
  }

  /* ── Q-change animation ── */
  .q-leave { animation: qLeave .3s forwards; }
  .q-enter { animation: qEnter .4s .25s both; }
  @keyframes qLeave { to { opacity: 0; transform: translateY(-12px); } }
  @keyframes qEnter { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: none; } }
</style>
</head>
<body>

<!-- Petal rain -->
<div class="petals-wrap" id="petals"></div>

<!-- Floating hearts bg -->
<div class="hearts-bg" id="heartsBg"></div>

<!-- Confetti layer -->
<div class="confetti-wrap" id="confettiWrap"></div>

<!-- Main card -->
<div class="card" id="card">

  <!-- Phase 1: Are you angry on me? -->
  <div id="phase1">
    <div class="ornament">❧ ❧ ❧</div>
    <div class="name-to">For Mrudula, from Dheeraj</div>
    <div class="question" id="q1">Are you angry on me?</div>
    <div class="sub" id="s1">Please be honest with me…</div>
    <div class="btns">
      <button class="btn btn-yes" id="yesBtn1">Yes</button>
      <button class="btn btn-no"  id="noBtn1">No</button>
    </div>
  </div>

  <!-- Phase 2: Do you love me? -->
  <div id="phase2" style="display:none;">
    <div class="ornament">♡ ♡ ♡</div>
    <div class="name-to">For Mrudula, from Dheeraj</div>
    <div class="question" id="q2">Do you love me?</div>
    <div class="sub" id="s2">Tell me the truth…</div>
    <div class="btns">
      <button class="btn btn-yes" id="yesBtn2">Yes</button>
      <button class="btn btn-no"  id="noBtn2">No</button>
    </div>
  </div>

  <!-- Final: love accepted -->
  <div id="phaseFinal" class="final">
    <div class="big-heart">💕</div>
    <h1>I knew it, Mrudula!<br/>I love you so much.</h1>
    <p>Forever yours — Dheeraj ♡</p>
  </div>

</div>

<script>
/* ─── Petal rain ─────────────────────────────────── */
(function(){
  const wrap = document.getElementById('petals');
  for(let i = 0; i < 28; i++){
    const p = document.createElement('div');
    p.className = 'petal';
    const size = 12 + Math.random()*14;
    p.style.cssText = `
      left:${Math.random()*100}%;
      width:${size}px; height:${size*1.2}px;
      animation-duration:${6+Math.random()*8}s;
      animation-delay:${Math.random()*10}s;
      opacity:0;
      background: hsl(${340+Math.random()*20},70%,${72+Math.random()*12}%);
    `;
    wrap.appendChild(p);
  }
})();

/* ─── Floating hearts bg ─────────────────────────── */
(function(){
  const wrap = document.getElementById('heartsBg');
  const hearts = ['♥','❤','♡','💗','💖'];
  for(let i = 0; i < 20; i++){
    const h = document.createElement('div');
    h.className = 'hbg';
    h.textContent = hearts[Math.floor(Math.random()*hearts.length)];
    h.style.cssText = `
      left:${Math.random()*100}%; top:${Math.random()*100}%;
      font-size:${1+Math.random()*2.5}rem;
      animation-delay:${Math.random()*8}s;
      animation-duration:${8+Math.random()*8}s;
    `;
    wrap.appendChild(h);
  }
})();

/* ─── Confetti burst ─────────────────────────────── */
function launchConfetti(){
  const wrap = document.getElementById('confettiWrap');
  wrap.innerHTML = '';
  const colors = ['#c0396b','#f7d6e0','#c9986a','#f7aac5','#7a1a3a','#fdeef4','#e07090'];
  for(let i = 0; i < 120; i++){
    const c = document.createElement('div');
    c.className = 'conf';
    const size = 6 + Math.random()*10;
    c.style.cssText = `
      left:${10+Math.random()*80}%;
      width:${size}px; height:${size}px;
      border-radius:${Math.random()>.5?'50%':'2px'};
      background:${colors[Math.floor(Math.random()*colors.length)]};
      animation-duration:${1.8+Math.random()*2}s;
      animation-delay:${Math.random()*.8}s;
    `;
    wrap.appendChild(c);
  }
}

/* ─── Phase 1 logic ──────────────────────────────── */
// YES sequence on phase 1
const yesStates = [
  { q: "Are you angry on me?",           s: "Please be honest with me…" },
  { q: "Are you sure?",                  s: "Think again, please…" },
  { q: "Sorry… Accept my love? 🌹",      s: "I mean it with all my heart." },
];
let yesIdx = 0;

document.getElementById('yesBtn1').addEventListener('click', function(){
  yesIdx++;
  if(yesIdx >= yesStates.length){
    // Loops back to "sorry / accept my love" forever until they press No
    yesIdx = yesStates.length - 1;
  }
  animateQuestion('q1','s1', yesStates[yesIdx].q, yesStates[yesIdx].s);
});

// NO on phase 1 → go to phase 2
document.getElementById('noBtn1').addEventListener('click', function(){
  document.getElementById('phase1').style.display = 'none';
  document.getElementById('phase2').style.display = 'block';
});

/* ─── Phase 2 logic ──────────────────────────────── */
const noResponses = [
  { q: "Do you love me?",                      s: "Tell me the truth…" },
  { q: "Are you sure you don't?",              s: "My heart refuses to believe that…" },
  { q: "Please don't do this… 🥺",            s: "I love you so much, Mrudula." },
  { q: "Really? Not even a little? 💔",        s: "You're breaking my heart…" },
  { q: "Look into your heart once more…",      s: "I'll wait forever for you." },
  { q: "I know you do… say it 🌸",            s: "Come on, don't be shy!" },
  { q: "Last chance… Do you love me?",         s: "I promise I'll make you smile every day." },
  // attempt 7 → both buttons become Yes
];

let noAttempts = 0;
const MAX_NO = 7;

document.getElementById('noBtn2').addEventListener('click', function(){
  noAttempts++;
  if(noAttempts >= MAX_NO){
    // Both buttons → Yes
    const yBtn = document.getElementById('yesBtn2');
    const nBtn = document.getElementById('noBtn2');
    nBtn.textContent  = 'Yes 💕';
    nBtn.className    = 'btn btn-yes';
    nBtn.onclick      = triggerFinal;
    yBtn.onclick      = triggerFinal;
    animateQuestion('q2','s2',
      "You do love me, don't you? 💖",
      "Both your heart & mind agree… 😊"
    );
    return;
  }
  const state = noResponses[noAttempts] || noResponses[noResponses.length-1];
  animateQuestion('q2','s2', state.q, state.s);
});

document.getElementById('yesBtn2').addEventListener('click', triggerFinal);

function triggerFinal(){
  launchConfetti();
  document.getElementById('phase2').style.display   = 'none';
  const fin = document.getElementById('phaseFinal');
  fin.style.display = 'flex';
}

/* ─── Smooth question swap ───────────────────────── */
function animateQuestion(qId, sId, newQ, newS){
  const qEl = document.getElementById(qId);
  const sEl = document.getElementById(sId);
  qEl.classList.add('q-leave');
  sEl.style.opacity = '0';
  setTimeout(()=>{
    qEl.textContent = newQ;
    sEl.textContent = newS;
    qEl.classList.remove('q-leave');
    qEl.classList.add('q-enter');
    sEl.style.opacity = '1';
    setTimeout(()=> qEl.classList.remove('q-enter'), 700);
  }, 300);
}
</script>
</body>
</html>
